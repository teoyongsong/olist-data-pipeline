version: 2

models:
  - name: dim_customer
    description: Customer dimension with CLV and tenure segment
    columns:
      - name: customer_key
        description: Surrogate key
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null, unique]

  - name: dim_product
    description: Product dimension
    columns:
      - name: product_key
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null, unique]

  - name: dim_seller
    description: Seller dimension
    columns:
      - name: seller_key
        tests: [not_null, unique]
      - name: seller_id
        tests: [not_null, unique]

  - name: fact_order_items
    description: Fact table at order item grain (one row per item in an order)
    columns:
      - name: order_item_key
        tests: [not_null, unique]
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: product_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key
      - name: total_item_value
        tests: [not_null]
